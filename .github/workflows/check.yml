name: Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths: &check_paths
      - app/**
      - bin/**
      - config/**
      - db/**
      - lib/**
      - test/**
      - vendor/**
      - public/**
      - Gemfile
      - Gemfile.lock
      - package.json
      - bun.lock
      - config.ru
      - Rakefile
      - mise.toml
      - .ruby-version
      - .rubocop.yml
      - .prettierignore
      - esbuild.config.js
      - esbuild.inject.js
      - postcss.config.js
      - tsconfig.json
      - tslint.json
      - Procfile.dev
      - Procfile.dev-hmr
      - .github/workflows/check.yml
  pull_request:
    branches:
      - main
    paths: *check_paths

jobs:
  Check:
    runs-on: [self-hosted, linux]
    services:
      db:
        image: postgres:latest
        ports: ['5432:5432']
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: Install dependencies
        run: |
          bundle install
          bun install

      - name: Install system dependencies
        run: sudo apt-get -yyq install libpq-dev

      - name: CI
        run: bin/ci

      - name: Zeitwerk
        run: bin/rails zeitwerk:check
