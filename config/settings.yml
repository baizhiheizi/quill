host: 'https://quill.im'
# Deprecated: Mixin OAuth authorization URL is configured by omniauth-mixin.
mixin_oauth_path: 'https://mixin.one/oauth/authorize'

# lauch time
launch_time:

# assets
icon_file: icon.png

# ws blaze
blaze_enable: false

# page
app_name: Quill
page_title: 'Quill: Build your value net on Web3 with Quill'
page_keywords: Quill, Write, Read, Web3, Blockchain, Bitcoin, ETH
page_description: Build your value net on Web3 with Quill  
twitter_account: with_quill

# assets
supported_assets:
  # BTC
  - c6d0c728-2624-429b-8e0d-d9d19b6592fa
  # XIN
  - c94ac88f-4671-3976-b60a-09064f1811e8
  # ETH
  - 43d61dcd-e413-450d-80b8-101d5e903357
  # pUSD
  - 31d2ea9c-95eb-3355-b65b-ba096853bc18

# whitelist
whitelist:
  enable: false
  mixin_id:
    - 7ed9292d-7c95-4333-aa48-a8c640064186

storage:
  endpoint: https://assets.quill.im

mixin_api_gate:
  enabled: true
  interactive_max_wait_seconds: 5
  scopes:
    quill_bot:
      min_interval_ms: 125
    revenue_bot:
      min_interval_ms: 200
    user:
      min_interval_ms: 250
  backoff:
    initial_seconds: 1
    max_seconds: 60
    multiplier: 2
