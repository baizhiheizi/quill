default: &default
  adapter:  postgresql
  host:     localhost
  encoding: unicode
  pool:     5
  username: postgres
  password: postgres
  template: template0

development:
  primary:
    <<: *default
    database: prsdigg_development
  cable:
    <<: *default
    database: prsdigg_development_cable
    migrations_paths: db/cable_migrate

test:
  adapter:  postgresql
  host:     localhost
  encoding: unicode
  database: prsdigg_test
  pool:     5
  username: postgres
  password: postgres
  template: template0

production:
  primary: &primary_production
    adapter:  postgresql
    host:     <%= ENV['DATABASE_HOST'] %>
    encoding: unicode
    database: <%= ENV['POSTGRES_DB'] %>
    username: <%= ENV['POSTGRES_USER'] %>
    password: <%= ENV['POSTGRES_PASSWORD'] %>
    pool:     <%= ENV.fetch("RAILS_MAX_THREADS", 32) %>
    template: template0
  cable:
    <<: *primary_production
    database: <%= ENV.fetch('POSTGRES_CABLE_DB', "#{ENV['POSTGRES_DB']}_cable") %>
    migrations_paths: db/cable_migrate
